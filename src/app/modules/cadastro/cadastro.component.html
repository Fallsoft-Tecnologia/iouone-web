    

<main class="container">
  <a href="/login">
    <p><i class="fa-regular fa-arrow-left"></i></p>
  </a>
  <p class="step-text">PASSO 1 DE 4</p>
  <h1 class="welcome-text">Bem vinda!</h1>
  <h2 class="easy-signup">É fácil assinar a IouOne.</h2>
  <p class="instruction-text">
    Informe seu E-mail e senha para começar na plataforma.
  </p>

  <form [formGroup]="clientForm" class="signup-form" (submit)="salvaLeadCliente()">
    <mat-form-field class="form-field" appearance="outline">
      <mat-label>E-mail</mat-label>
      <input
        matInput
        formControlName="email"
        placeholder="Digite seu e-mail"
        type="email"
      />
    </mat-form-field>
    <mat-form-field class="form-field" appearance="outline">
      <mat-label>Senha</mat-label>
      <input
        matInput
        formControlName="password"
        placeholder="Digite sua senha"
        type="password"
      />
    </mat-form-field>
    
      <app-enter-button [textButton]="textButton"></app-enter-button>
    
  </form>
</main>
